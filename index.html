<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Pirali Game - A thrilling adventure experience">
    <meta name="theme-color" content="#000000">
    <link rel="manifest" href="manifest.json">
    <title>Pirali Game</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div id="game-container">
        <div id="menu-overlay">
            <h1>Pirali Game</h1>
            <button id="start-game-btn">Start Game</button>
        </div>
        <div id="intro-system"></div>
       <div id="lb-overlay" style="
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.75);
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 999;
">

  <div style="
    width: 420px;
    max-width: 90%;
    background: #111;
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 14px;
    padding: 20px;
    color: white;
    box-shadow: 0 20px 60px rgba(0,0,0,0.4);
  ">

    <h2 style="margin-top:0;">🏆 Leaderboard</h2>

    <div id="lb-list" style="
      max-height: 320px;
      overflow-y: auto;
      margin-bottom: 16px;
    ">
      Loading leaderboard...
    </div>

    <button
      id="lb-play"
      onclick="lbPlay()"
      style="
        width: 100%;
        padding: 12px;
        border: none;
        border-radius: 10px;
        background: #d4af37;
        color: black;
        font-weight: bold;
        cursor: pointer;
      "
    >
      ▶ Start Game
    </button>

  </div>
</div>
    </div>
    <script src="js/config.js"></script>
    <script src="js/game.js"></script>
    <script src="js/menu.js"></script>
    <script src="js/intro.js"></script>
    <script src="js/leaderboard.js"></script>
</body>
</html>
